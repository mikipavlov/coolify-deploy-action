name: "Deploy to Coolify"
description: "Trigger Coolify deployment and poll for completion"
author: "mikipavlov"

inputs:
  domain:
    description: "Coolify instance domain (e.g., https://coolify.example.com)"
    required: true
  uuid:
    description: "Application UUID to deploy"
    required: true
  token:
    description: "Coolify API token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Deploy
      shell: bash
      env:
        COOLIFY_DOMAIN: ${{ inputs.domain }}
        COOLIFY_UUID: ${{ inputs.uuid }}
        COOLIFY_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        domain=$(sed 's:/*$::' <<< "$COOLIFY_DOMAIN")
        trigger_url="$domain/api/v1/deploy?uuid=$COOLIFY_UUID"

        echo "🚀 Triggering deployment..."
        echo "   URL: $trigger_url"

        set +e
        http_code=$(curl -s -w "%{http_code}" -o /tmp/trigger.json \
          -H "Authorization: Bearer $COOLIFY_TOKEN" \
          -H "Content-Type: application/json" \
          "$trigger_url" 2>/tmp/err.txt)
        curl_exit=$?
        set -e

        response=$(cat /tmp/trigger.json 2>/dev/null || echo "")

        if [[ $curl_exit -ne 0 ]]; then
          echo "❌ Curl error: $(cat /tmp/err.txt 2>/dev/null || echo 'unknown')"
          exit 1
        elif [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
          echo "❌ Trigger failed with HTTP $http_code"
          echo "   Response: $response"
          exit 1
        fi

        deployment_uuid=$(jq -r '.deployments[0].deployment_uuid' <<< "$response")
        echo "✅ Deployment triggered: $deployment_uuid"

        # Primary poll URL: direct deployment lookup
        poll_url="$domain/api/v1/deployments/$deployment_uuid"
        # Fallback poll URL: list deployments for the application
        fallback_url="$domain/api/v1/deployments/applications/$COOLIFY_UUID"
        echo "📡 Polling: $poll_url"
        echo "   Fallback: $fallback_url"

        error_count=0
        empty_count=0
        not_found_count=0
        use_fallback=false

        for i in {1..60}; do
          if [[ "$use_fallback" == "true" ]]; then
            current_url="$fallback_url"
          else
            current_url="$poll_url"
          fi

          set +e
          http_code=$(curl -s -w "%{http_code}" -o /tmp/res.json \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$current_url" 2>/tmp/err.txt)
          curl_exit=$?
          set -e

          response=$(cat /tmp/res.json 2>/dev/null || echo "")
          echo "[Poll $i/60] HTTP=$http_code curl_exit=$curl_exit (${use_fallback:+fallback}${use_fallback:-direct})"

          if [[ $curl_exit -ne 0 ]]; then
            error_count=$((error_count + 1))
            echo "   ⚠️ Curl error: $(cat /tmp/err.txt 2>/dev/null || echo 'unknown')"
          elif [[ -z "$http_code" ]]; then
            error_count=$((error_count + 1))
            echo "   ⚠️ Empty HTTP code"
          elif [[ "$http_code" == "404" ]]; then
            not_found_count=$((not_found_count + 1))
            error_count=0
            if [[ "$use_fallback" == "false" && $not_found_count -ge 5 ]]; then
              echo "   ⚠️ Direct endpoint returned 404 ${not_found_count}x, switching to fallback..."
              use_fallback=true
            else
              echo "   ⏳ Deployment not found yet..."
            fi
          elif [[ "$http_code" == "403" ]]; then
            echo "   ❌ Permission denied (403)"
            echo "   Response: $response"
            echo "   Hint: API token needs 'read' permission"
            exit 1
          elif [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            error_count=$((error_count + 1))
            echo "   ⚠️ HTTP $http_code: $response"
          else
            error_count=0

            if [[ "$use_fallback" == "true" ]]; then
              # Extract status from the application deployments list
              status=$(jq -r --arg uuid "$deployment_uuid" \
                '[.[] | select(.deployment_uuid == $uuid)] | first | .status // empty' \
                <<< "$response" 2>/dev/null || echo "")

              # If deployment not found in list, check the latest deployment
              if [[ -z "$status" ]]; then
                status=$(jq -r 'first | .status // empty' <<< "$response" 2>/dev/null || echo "")
                if [[ -n "$status" ]]; then
                  echo "   Status (latest deployment): '$status'"
                fi
              else
                echo "   Status: '$status'"
              fi
            else
              status=$(jq -r '.status // empty' <<< "$response" 2>/dev/null || echo "")
              echo "   Status: '$status'"
            fi

            case "$status" in
              finished)
                echo "✅ Deployment completed successfully"
                exit 0
                ;;
              failed|cancelled|cancelled-by-user)
                echo "❌ Deployment failed: $status"
                exit 1
                ;;
              in_progress|queued)
                : ;;
              "")
                empty_count=$((empty_count + 1))
                [[ $empty_count -ge 10 ]] && { echo "ℹ️ Status empty 10x, assuming success"; exit 0; }
                ;;
              *)
                echo "   ❓ Unknown status: $status"
                ;;
            esac
          fi

          [[ $error_count -ge 5 ]] && { echo "❌ Too many errors"; exit 1; }
          sleep 3
        done

        echo "❌ Deployment polling timed out"
        exit 1
